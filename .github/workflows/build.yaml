name: Build add-on image

# Builds the Plejd add-on image for each supported architecture.
# - On pull_request / push to master: build only (--test), validates the build.
# - On a published release: build and push the image to GHCR, tagged with the
#   version from plejd/config.json (and :latest).
#
# Home Assistant pulls these pre-built images (see "image" in config.json) instead
# of building the add-on locally on the user's machine.

on:
  push:
    branches:
      - master
    paths:
      - "plejd/**"
      - ".github/workflows/build.yaml"
  pull_request:
    paths:
      - "plejd/**"
      - ".github/workflows/build.yaml"
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64
          - amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.arch }} add-on image
        uses: home-assistant/builder@2026.06.0
        with:
          args: |
            --${{ matrix.arch }}
            --target /data/plejd
            --image "{arch}-hassio-plejd"
            --docker-hub "ghcr.io/oleost"
            --addon
            ${{ (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && ' ' || '--test' }}
