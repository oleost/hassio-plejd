name: Build add-on image

# Builds the Plejd add-on image for each supported architecture with buildx.
# - On pull_request / push to master: build only (no push), validates the build.
# - On a published release (or manual dispatch): build and push to GHCR, tagged
#   with the version from plejd/config.json (and :latest).
#
# Home Assistant pulls these pre-built images (see "image" in config.json) instead
# of building the add-on locally on the user's machine.

on:
  push:
    branches:
      - master
    paths:
      - "plejd/**"
      - ".github/workflows/build.yaml"
  pull_request:
    paths:
      - "plejd/**"
      - ".github/workflows/build.yaml"
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # build-image builds for the runner's native platform, so each arch is
          # built on a matching native runner (the HA base images are per-arch).
          - arch: aarch64
            base: ghcr.io/hassio-addons/base/aarch64:21.0.0
            runner: ubuntu-24.04-arm
          - arch: amd64
            base: ghcr.io/hassio-addons/base/amd64:21.0.0
            runner: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Read add-on version
        id: meta
        shell: bash
        run: echo "version=$(jq -r .version plejd/config.json)" >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.arch }} image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          context: plejd
          image: ghcr.io/oleost/${{ matrix.arch }}-hassio-plejd
          image-tags: |
            ${{ steps.meta.outputs.version }}
            latest
          version: ${{ steps.meta.outputs.version }}
          build-args: |
            BUILD_FROM=${{ matrix.base }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.meta.outputs.version }}
          push: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
          cosign: false
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
